<!DOCTYPE html>
<html>
<head>
<title>موقع القنوات</title>
</head>

<body>

<h1>القنوات المباشرة</h1>

<ul id="channels"></ul>

<script>

let channels = JSON.parse(localStorage.getItem("channels")) || []
let list = document.getElementById("channels")

channels.forEach((c,i)=>{
let li = document.createElement("li")

li.innerHTML = `
<a href="${c.link}" target="_blank">${c.name}</a>
`

list.appendChild(li)
})

</script>

</body>
</html>
