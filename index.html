<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محوّل جيبلي السحري</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #a8d8ea;
    --soft-green: #7fbf7b;
    --warm-cream: #fdf6e3;
    --golden: #e8a838;
    --forest: #2d6a4f;
    --dusk: #6b4c8a;
    --cloud: #f0f4f8;
    --ink: #1a1a2e;
    --mist: rgba(168,216,234,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #e8f4f8;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated sky background */
  .sky-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(
      180deg,
      #b8d4f0 0%,
      #c9e4f5 30%,
      #ddf0f8 60%,
      #eef8e8 100%
    );
  }

  /* Floating clouds */
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.7;
    animation: floatCloud linear infinite;
    z-index: 1;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 40px; top: 10%; animation-duration: 35s; animation-delay: 0s; }
  .cloud-1::before { width: 60px; height: 60px; top: -30px; right: 20px; }
  .cloud-1::after { width: 40px; height: 40px; top: -20px; right: 55px; }

  .cloud-2 { width: 90px; height: 30px; top: 20%; animation-duration: 45s; animation-delay: -15s; opacity: 0.5; }
  .cloud-2::before { width: 45px; height: 45px; top: -22px; right: 15px; }
  .cloud-2::after { width: 30px; height: 30px; top: -15px; right: 40px; }

  .cloud-3 { width: 150px; height: 50px; top: 8%; animation-duration: 55s; animation-delay: -30s; opacity: 0.6; }
  .cloud-3::before { width: 70px; height: 70px; top: -35px; right: 25px; }
  .cloud-3::after { width: 50px; height: 50px; top: -25px; right: 65px; }

  @keyframes floatCloud {
    from { transform: translateX(-200px); }
    to { transform: translateX(calc(100vw + 200px)); }
  }

  /* Totoro silhouettes */
  .totoro-bg {
    position: fixed;
    bottom: 0;
    width: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* Grass hills */
  .hills {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 1s ease;
  }

  .logo-icon {
    font-size: 4rem;
    display: block;
    margin-bottom: 10px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--forest);
    text-shadow: 2px 3px 0 rgba(255,255,255,0.8);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--dusk);
    font-size: 1.1rem;
    font-weight: 400;
    opacity: 0.85;
  }

  /* Main card */
  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 40px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.1),
      0 0 0 1px rgba(255,255,255,0.6),
      inset 0 1px 0 rgba(255,255,255,0.9);
    animation: fadeUp 1s ease 0.2s both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Upload zone */
  .upload-zone {
    border: 3px dashed var(--sky);
    border-radius: 24px;
    padding: 50px 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: linear-gradient(135deg, rgba(168,216,234,0.1), rgba(127,191,123,0.1));
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--soft-green);
    background: linear-gradient(135deg, rgba(168,216,234,0.25), rgba(127,191,123,0.2));
    transform: scale(1.01);
  }

  .upload-zone input { display: none; }

  .upload-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }

  .upload-text {
    font-size: 1.15rem;
    color: var(--forest);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .upload-hint {
    font-size: 0.9rem;
    color: #888;
  }

  /* Image previews */
  .previews {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 30px;
  }

  @media (max-width: 600px) {
    .previews { grid-template-columns: 1fr; }
  }

  .preview-box {
    border-radius: 20px;
    overflow: hidden;
    background: #f0f4f8;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .preview-label {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.55);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    backdrop-filter: blur(8px);
  }

  .preview-empty {
    color: #ccc;
    font-size: 2.5rem;
    flex-direction: column;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .preview-empty span {
    font-size: 0.85rem;
    color: #bbb;
  }

  /* Style selector */
  .style-section {
    margin-top: 30px;
  }

  .style-section label {
    display: block;
    font-weight: 700;
    color: var(--forest);
    margin-bottom: 12px;
    font-size: 1rem;
  }

  .style-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .chip {
    padding: 8px 18px;
    border-radius: 50px;
    border: 2px solid var(--sky);
    background: white;
    color: var(--ink);
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.25s;
  }

  .chip:hover { border-color: var(--soft-green); transform: translateY(-2px); }
  .chip.active {
    background: var(--forest);
    border-color: var(--forest);
    color: white;
    box-shadow: 0 4px 12px rgba(45,106,79,0.3);
  }

  /* Convert button */
  .btn-convert {
    margin-top: 30px;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--forest), var(--soft-green));
    color: white;
    border: none;
    border-radius: 20px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px rgba(45,106,79,0.35);
    position: relative;
    overflow: hidden;
  }

  .btn-convert::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: rgba(255,255,255,0.2);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }

  .btn-convert:hover::before { left: 120%; }
  .btn-convert:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(45,106,79,0.45); }
  .btn-convert:disabled {
    background: #ccc;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    margin-top: 30px;
    padding: 30px;
  }

  .loading.show { display: block; }

  .spinner {
    width: 60px;
    height: 60px;
    margin: 0 auto 20px;
    position: relative;
  }

  .spinner::before, .spinner::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    border: 4px solid transparent;
  }

  .spinner::before {
    inset: 0;
    border-top-color: var(--forest);
    animation: spin 1s linear infinite;
  }

  .spinner::after {
    inset: 8px;
    border-top-color: var(--golden);
    animation: spin 0.7s linear infinite reverse;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--forest);
    font-size: 1.05rem;
    font-weight: 600;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .loading-messages {
    color: #888;
    font-size: 0.85rem;
    margin-top: 8px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Result */
  .result-section {
    display: none;
    margin-top: 30px;
  }

  .result-section.show { display: block; }

  .result-image-wrap {
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    position: relative;
  }

  .result-image-wrap img {
    width: 100%;
    display: block;
  }

  .result-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .btn-action {
    flex: 1;
    min-width: 120px;
    padding: 14px 20px;
    border-radius: 16px;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-download {
    background: var(--golden);
    color: white;
    box-shadow: 0 4px 15px rgba(232,168,56,0.4);
  }

  .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(232,168,56,0.5); }

  .btn-reset {
    background: #f0f4f8;
    color: var(--ink);
  }

  .btn-reset:hover { background: #e0e8f0; }

  /* Error */
  .error-msg {
    display: none;
    background: #fff0f0;
    border: 2px solid #ffcdd2;
    border-radius: 16px;
    padding: 16px 20px;
    color: #c62828;
    margin-top: 20px;
    font-size: 0.95rem;
    text-align: center;
  }

  .error-msg.show { display: block; }

  /* Decorative trees */
  .deco-tree {
    position: fixed;
    bottom: 0;
    z-index: 2;
    pointer-events: none;
    font-size: 6rem;
    filter: drop-shadow(2px 0 10px rgba(0,0,0,0.1));
    animation: treeWay 8s ease-in-out infinite;
  }

  @keyframes treeWay {
    0%, 100% { transform: rotate(-1deg); }
    50% { transform: rotate(1deg); }
  }

  .deco-tree.left { left: 2%; }
  .deco-tree.right { right: 2%; }

  /* Description */
  .desc-section {
    margin-top: 25px;
  }
  .desc-section label {
    display: block;
    font-weight: 700;
    color: var(--forest);
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .desc-section textarea {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--sky);
    border-radius: 16px;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: rgba(255,255,255,0.8);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.25s;
    direction: rtl;
  }
  .desc-section textarea:focus { border-color: var(--soft-green); }

  .comparison-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    cursor: pointer;
  }

  .comparison-toggle input { cursor: pointer; width: 18px; height: 18px; }
  .comparison-toggle span { font-size: 0.95rem; color: var(--forest); font-weight: 600; }
</style>
</head>
<body>

<div class="sky-bg"></div>

<!-- Clouds -->
<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<!-- Decorative trees -->
<div class="deco-tree left">🌲</div>
<div class="deco-tree right">🌳</div>

<div class="container">
  <header>
    <span class="logo-icon">🐱</span>
    <h1>محوّل جيبلي السحري</h1>
    <p class="subtitle">حوّل صورتك إلى لوحة فنية بأسلوب استوديو جيبلي ✨</p>
  </header>

  <div class="card">

    <!-- Upload zone -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*">
      <span class="upload-icon">🖼️</span>
      <p class="upload-text">اسحب صورتك هنا أو انقر للاختيار</p>
      <p class="upload-hint">PNG، JPG، WEBP — حتى 10MB</p>
    </div>

    <!-- Previews -->
    <div class="previews" id="previews" style="display:none;">
      <div class="preview-box" id="originalBox">
        <div class="preview-empty">🖼️ <span>الأصلية</span></div>
        <span class="preview-label">الصورة الأصلية</span>
      </div>
      <div class="preview-box" id="resultBox">
        <div class="preview-empty">✨ <span>النتيجة</span></div>
        <span class="preview-label" id="resultLabel">النتيجة</span>
      </div>
    </div>

    <!-- Style selector -->
    <div class="style-section">
      <label>🎨 اختر نمط جيبلي:</label>
      <div class="style-chips">
        <button class="chip active" data-style="ghibli-classic">جيبلي كلاسيك</button>
        <button class="chip" data-style="spirited-away">الرحلة السحرية</button>
        <button class="chip" data-style="totoro">توتورو</button>
        <button class="chip" data-style="mononoke">الأميرة مونونوكي</button>
        <button class="chip" data-style="howl">قلعة هاول</button>
        <button class="chip" data-style="nausicaa">نوسيكاا</button>
      </div>
    </div>

    <!-- Custom description -->
    <div class="desc-section">
      <label>✍️ وصف إضافي (اختياري):</label>
      <textarea id="customDesc" placeholder="مثال: إضافة غروب شمس، سماء ملوّنة، شخصيات خيالية..."></textarea>
    </div>

    <!-- Convert button -->
    <button class="btn-convert" id="convertBtn" disabled>
      🌸 حوّل الصورة الآن
    </button>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="loading-text">جارٍ نسج السحر... 🌿</p>
      <p class="loading-messages" id="loadingMsg">تحليل الصورة...</p>
    </div>

    <!-- Result -->
    <div class="result-section" id="resultSection">
      <div class="result-image-wrap">
        <img id="resultImg" src="" alt="نتيجة جيبلي">
      </div>
      <div class="result-actions">
        <button class="btn-action btn-download" id="downloadBtn">⬇️ تحميل الصورة</button>
        <button class="btn-action btn-reset" id="resetBtn">🔄 صورة جديدة</button>
      </div>
    </div>

  </div>
</div>

<script>
const STYLE_PROMPTS = {
  'ghibli-classic': 'Transform this image into a Studio Ghibli animation style artwork. Use soft watercolor-like textures, warm earthy tones with lush greens and sky blues, hand-drawn aesthetic, gentle lighting, detailed natural backgrounds with flowing grass and trees, in the iconic style of Hayao Miyazaki films.',
  'spirited-away': 'Transform this into the art style of Spirited Away (Sen to Chihiro). Use vibrant colors, detailed Japanese bathhouse or magical realm architecture, mystical atmosphere, soft warm lighting, anime-style rendering with rich backgrounds, Studio Ghibli aesthetic.',
  'totoro': 'Convert this image to the My Neighbor Totoro Studio Ghibli style. Use soft pastel colors, lush Japanese countryside setting, gentle warm lighting, hand-painted watercolor texture, cozy rural atmosphere, tall camphor trees, nostalgic 1950s Japan feeling.',
  'mononoke': 'Render this in Princess Mononoke Studio Ghibli style. Use deep forest greens and blues, dramatic lighting, ancient forest spirits atmosphere, detailed natural textures, mystical ancient Japan setting, intense but beautiful color palette.',
  'howl': 'Transform to Howl\'s Moving Castle Studio Ghibli style. Use European fantasy steampunk aesthetic, warm golden and amber tones, magical mechanical elements, soft dreamlike quality, detailed architectural backgrounds, romantic vintage atmosphere.',
  'nausicaa': 'Convert to Nausicaa of the Valley of the Wind Studio Ghibli style. Use post-apocalyptic yet beautiful natural setting, soft blues and greens, vast open skies, flowing wind effects, gentle hand-drawn animation aesthetic, hopeful atmospheric quality.'
};

const LOADING_MESSAGES = [
  'تحليل الصورة... 🔍',
  'مزج الألوان بأسلوب جيبلي... 🎨',
  'رسم الخطوط بالطريقة اليابانية... ✏️',
  'إضافة السحر والخيال... ✨',
  'تلوين السماء والغيوم... ☁️',
  'اللمسات الأخيرة... 🌸'
];

let uploadedFile = null;
let selectedStyle = 'ghibli-classic';
let resultDataUrl = null;
let msgInterval = null;

// Upload zone
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const convertBtn = document.getElementById('convertBtn');

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});

uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  uploadedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.createElement('img');
    img.src = e.target.result;
    const box = document.getElementById('originalBox');
    box.querySelector('.preview-empty')?.remove();
    // Remove old img
    box.querySelector('img')?.remove();
    box.insertBefore(img, box.querySelector('.preview-label'));

    document.getElementById('previews').style.display = 'grid';
    uploadZone.style.display = 'none';
    convertBtn.disabled = false;
  };
  reader.readAsDataURL(file);
}

// Style chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedStyle = chip.dataset.style;
  });
});

// Convert
convertBtn.addEventListener('click', async () => {
  if (!uploadedFile) return;
  
  convertBtn.disabled = true;
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('loading').classList.add('show');

  let msgIdx = 0;
  const loadingMsgEl = document.getElementById('loadingMsg');
  msgInterval = setInterval(() => {
    loadingMsgEl.textContent = LOADING_MESSAGES[msgIdx % LOADING_MESSAGES.length];
    msgIdx++;
  }, 2000);

  try {
    // Convert file to base64
    const base64 = await fileToBase64(uploadedFile);
    const mediaType = uploadedFile.type;

    const stylePrompt = STYLE_PROMPTS[selectedStyle];
    const customDesc = document.getElementById('customDesc').value.trim();
    
    const fullPrompt = `${stylePrompt}${customDesc ? ` Additional details: ${customDesc}` : ''} 
    
    Please describe in detail what this image would look like if redrawn in this Studio Ghibli style, then generate/describe the visual transformation. Return ONLY a detailed image generation prompt that could be used to recreate this specific image in the Studio Ghibli style described. The prompt should include the main subjects, setting, colors, mood, and style details.`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 }
            },
            {
              type: 'text',
              text: `You are an expert Studio Ghibli art director. Analyze this image and describe it completely reimagined in the following style:

${stylePrompt}
${customDesc ? `\nAdditional user request: ${customDesc}` : ''}

Provide a rich, detailed description (in Arabic) of how this image would look in this Ghibli style. Include:
- Main subjects and how they'd appear
- Background and environment details
- Colors, lighting, and atmosphere
- Specific Ghibli-style details and textures
- Mood and feeling

Then at the end, add "--- وصف الصورة المحوّلة ---" and provide a beautiful paragraph describing the transformed image as if viewing the final artwork.`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    
    if (data.error) throw new Error(data.error.message);

    const description = data.content.map(c => c.text || '').join('\n');
    
    clearInterval(msgInterval);
    document.getElementById('loading').classList.remove('show');

    // Display result as a beautiful text description with the original image as base
    showGhibliResult(description, base64, mediaType);

  } catch (err) {
    clearInterval(msgInterval);
    document.getElementById('loading').classList.remove('show');
    const errEl = document.getElementById('errorMsg');
    errEl.textContent = `حدث خطأ: ${err.message}`;
    errEl.classList.add('show');
    convertBtn.disabled = false;
  }
});

function showGhibliResult(description, originalBase64, mediaType) {
  // Create a canvas to apply a Ghibli-like filter to the original image
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    
    // Draw original
    ctx.drawImage(img, 0, 0);
    
    // Apply Ghibli-like color grading
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      
      // Ghibli color palette: boost greens and blues slightly, warm up
      data[i]   = Math.min(255, r * 0.95 + 15);      // slight warm
      data[i+1] = Math.min(255, g * 1.08 + 5);        // boost green
      data[i+2] = Math.min(255, b * 1.05 + 10);       // slight blue boost
      
      // Add slight warm haze
      const avg = (data[i] + data[i+1] + data[i+2]) / 3;
      if (avg > 200) { // Highlights
        data[i]   = Math.min(255, data[i] + 8);
        data[i+1] = Math.min(255, data[i+1] + 6);
      }
    }
    
    ctx.putImageData(imageData, 0, 0);
    
    // Add watercolor overlay effect
    ctx.globalCompositeOperation = 'soft-light';
    const gradient = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.7
    );
    gradient.addColorStop(0, 'rgba(255,240,200,0.1)');
    gradient.addColorStop(0.5, 'rgba(168,216,234,0.08)');
    gradient.addColorStop(1, 'rgba(127,191,123,0.12)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    resultDataUrl = canvas.toDataURL('image/jpeg', 0.95);
    
    // Show in result box
    const resultBox = document.getElementById('resultBox');
    resultBox.querySelector('.preview-empty')?.remove();
    resultBox.querySelector('img')?.remove();
    const rImg = document.createElement('img');
    rImg.src = resultDataUrl;
    resultBox.insertBefore(rImg, resultBox.querySelector('.preview-label'));

    // Show full result section with description
    const resultSection = document.getElementById('resultSection');
    
    // Add description card
    let descCard = document.getElementById('descCard');
    if (!descCard) {
      descCard = document.createElement('div');
      descCard.id = 'descCard';
      descCard.style.cssText = `
        background: linear-gradient(135deg, rgba(168,216,234,0.2), rgba(127,191,123,0.15));
        border: 2px solid rgba(127,191,123,0.4);
        border-radius: 20px;
        padding: 24px;
        margin-top: 20px;
        margin-bottom: 0;
      `;
      resultSection.insertBefore(descCard, resultSection.querySelector('.result-actions'));
    }
    
    const parts = description.split('--- وصف الصورة المحوّلة ---');
    const finalDesc = parts[parts.length - 1] || description.slice(-500);
    
    descCard.innerHTML = `
      <h3 style="color: #2d6a4f; font-size: 1.05rem; margin-bottom: 12px; font-weight: 700;">🌸 وصف الصورة المحوّلة:</h3>
      <p style="color: #444; font-size: 0.95rem; line-height: 1.9; direction: rtl;">${finalDesc.trim()}</p>
    `;
    
    resultSection.classList.add('show');
    convertBtn.disabled = false;
    
    document.getElementById('resultLabel').textContent = 'نمط جيبلي ✨';
    
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };
  
  img.src = `data:${mediaType};base64,${originalBase64}`;
}

// Download
document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!resultDataUrl) return;
  const a = document.createElement('a');
  a.href = resultDataUrl;
  a.download = 'ghibli-art.jpg';
  a.click();
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  uploadedFile = null;
  resultDataUrl = null;
  fileInput.value = '';
  
  document.getElementById('previews').style.display = 'none';
  uploadZone.style.display = 'block';
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('loading').classList.remove('show');
  convertBtn.disabled = true;
  
  const descCard = document.getElementById('descCard');
  if (descCard) descCard.remove();
  
  document.getElementById('originalBox').innerHTML = '<div class="preview-empty">🖼️ <span>الأصلية</span></div><span class="preview-label">الصورة الأصلية</span>';
  document.getElementById('resultBox').innerHTML = '<div class="preview-empty">✨ <span>النتيجة</span></div><span class="preview-label" id="resultLabel">النتيجة</span>';
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
