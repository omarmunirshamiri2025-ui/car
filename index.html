<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة · تعز · تقويم تساقط الثلوج</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Amiri', 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2f3f 0%, #16222e 100%);
            position: relative;
            overflow-x: hidden;
            color: #e7f0fd;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* حاوية الثلج (خلفية متحركة) */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .main-card {
            position: relative;
            z-index: 10;
            background: rgba(10, 25, 40, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 3rem 1rem 3rem 1rem;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(173, 216, 230, 0.2) inset;
            max-width: 800px;
            width: 100%;
            padding: 2rem 1.8rem;
            transition: 0.3s;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #8fcbff, 0 0 20px #3e6c9e;
            color: #f0f9ff;
            border-bottom: 1px dashed #7fa9c9;
            padding-bottom: 0.6rem;
            display: inline-block;
        }

        .header h1 span {
            font-size: 1.2rem;
            background: #2c4b6c;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            margin-right: 0.5rem;
            font-weight: 300;
            vertical-align: middle;
        }

        .date-compact {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 20, 40, 0.6);
            border-radius: 60px;
            padding: 0.7rem 1.5rem;
            margin: 1.5rem 0 2rem 0;
            border: 1px solid #5688b7;
            box-shadow: 0 4px 10px rgba(0, 10, 20, 0.6);
            font-size: 1.2rem;
        }

        .gregorian, .hijri {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .gregorian i, .hijri i {
            font-size: 1.6rem;
            opacity: 0.8;
        }

        /* شبكة مواقيت الصلاة */
        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin: 2rem 0 2.2rem;
        }

        .prayer-item {
            background: rgba(12, 30, 48, 0.7);
            border-radius: 2rem 0.5rem 2rem 0.5rem;
            padding: 1rem 0.6rem;
            text-align: center;
            border: 1px solid #4f7ea3;
            box-shadow: 0 5px 0 #0d1f2c;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }

        .prayer-item:hover {
            transform: translateY(-4px);
            border-color: #b2d9f0;
            background: rgba(20, 45, 70, 0.8);
        }

        .prayer-name {
            font-size: 1.4rem;
            font-weight: 400;
            color: #d3eaff;
            margin-bottom: 0.4rem;
        }

        .prayer-time {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ecf9ff, #c9e2f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 5px #9fc9ff;
        }

        .share-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2.8rem 0 1rem;
        }

        .share-btn {
            background: linear-gradient(145deg, #1f4b6e, #0f2f4a);
            border: 1px solid #87b9de;
            color: #f0f9ff;
            font-size: 1.5rem;
            font-weight: 300;
            padding: 0.9rem 2.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0a1925, 0 10px 20px rgba(0, 0, 0, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            transition: 0.1s ease-out;
            letter-spacing: 1px;
        }

        .share-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0a1925, 0 5px 12px black;
        }

        .share-btn i {
            font-size: 2rem;
            filter: drop-shadow(0 2px 2px black);
        }

        .footer-note {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 2rem;
            border-top: 1px dashed #31638b;
            padding-top: 1rem;
        }

        /* أيقونات بديلة (نصوص) */
        .icon-em {
            font-size: 1.8rem;
            line-height: 1;
        }

        /* تكيف صغير */
        @media (max-width: 480px) {
            .main-card { padding: 1.2rem; }
            .prayer-time { font-size: 1.6rem; }
            .date-compact { flex-direction: column; align-items: center; gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- قماش الثلج (خلفية متحركة) -->
    <canvas id="snow-container"></canvas>

    <main class="main-card">
        <div class="header">
            <h1>🌙 تعز <span>اليمن</span></h1>
        </div>

        <!-- التقويم الميلادي والعربي (يتم تعبئته بالجافاسكربت) -->
        <div class="date-compact" id="dateDisplay">
            <div class="gregorian"><span class="icon-em">📅</span> <span id="gregorianDate">--</span></div>
            <div class="hijri"><span class="icon-em">☪️</span> <span id="hijriDate">--</span></div>
        </div>

        <!-- مواقيت الصلاة (بيانات ثابتة نموذجية + تحديث عبر js) -->
        <div class="prayer-grid" id="prayerTimes">
            <div class="prayer-item"><div class="prayer-name">الفجر</div><div class="prayer-time" id="fajr">05:12</div></div>
            <div class="prayer-item"><div class="prayer-name">الشروق</div><div class="prayer-time" id="shurooq">06:35</div></div>
            <div class="prayer-item"><div class="prayer-name">الظهر</div><div class="prayer-time" id="dhuhr">12:10</div></div>
            <div class="prayer-item"><div class="prayer-name">العصر</div><div class="prayer-time" id="asr">15:28</div></div>
            <div class="prayer-item"><div class="prayer-name">المغرب</div><div class="prayer-time" id="maghrib">17:56</div></div>
            <div class="prayer-item"><div class="prayer-name">العشاء</div><div class="prayer-time" id="isha">19:15</div></div>
        </div>

        <!-- زر مشاركة التقويم -->
        <div class="share-area">
            <button class="share-btn" id="shareCalendarBtn">
                <span class="icon-em">📆</span> مشاركة التقويم
            </button>
        </div>

        <div class="footer-note">
            ❄️ تساقط الثلوج يحاكي أجواء شتاء تعز ❄️
        </div>
    </main>

    <script>
        (function() {
            // ---------- 1. خلفية الثلج (canvas) ----------
            const canvas = document.getElementById('snow-container');
            let ctx = canvas.getContext('2d');

            let width, height;
            let particles = [];

            function initCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                // إعادة تعيين الجسيمات بما يتناسب مع الحجم الجديد
                createSnowParticles(180);  // عدد حبات الثلج
            }

            function createSnowParticles(count) {
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 3.5 + 1.2,
                        speedY: Math.random() * 1.2 + 0.3,
                        speedX: Math.random() * 0.3 - 0.15,   // انجراف خفيف
                        opacity: Math.random() * 0.6 + 0.3
                    });
                }
            }

            function drawSnow() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#f0f9ff';
                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.fill();
                }
            }

            function updateSnow() {
                for (let p of particles) {
                    p.y += p.speedY;
                    p.x += p.speedX;

                    // إعادة التدوير عند الخروج من الشاشة
                    if (p.y > height + 10) {
                        p.y = -10;
                        p.x = Math.random() * width;
                    }
                    if (p.x > width + 10) p.x = -10;
                    if (p.x < -10) p.x = width + 10;
                }
            }

            function animateSnow() {
                updateSnow();
                drawSnow();
                requestAnimationFrame(animateSnow);
            }

            window.addEventListener('resize', () => {
                initCanvas();
            });

            initCanvas();
            animateSnow();

            // ---------- 2. حساب التاريخ الميلادي والهجري ----------
            function getHijriDate(date) {
                // تحويل بسيط (تقريب أم القرى) باستخدام مكتبة مدمجة - Intl.DateTimeFormat
                // لكنها تعطي تقويماً عربياً قمرياً (قد يختلف دقة لكن للعرض مقبول)
                try {
                    const formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric'
                    });
                    return formatter.format(date);
                } catch (e) {
                    // fallback يدوي بسيط (فقط لعرض شيء)
                    const hijriMonthNames = ["محرم", "صفر", "ربيع الأول", "ربيع الآخر", "جمادى الأولى", "جمادى الآخرة", "رجب", "شعبان", "رمضان", "شوال", "ذو القعدة", "ذو الحجة"];
                    // ليس دقيقًا لكنه للاحتياط
                    return "1 رمضان 1445 (تقريبي)";
                }
            }

            function updateDates() {
                const today = new Date();
                // ميلادي بتنسيق جميل
                const optionsGreg = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const gregStr = today.toLocaleDateString('ar-EG', optionsGreg); // استخدام العربية (مصر)
                document.getElementById('gregorianDate').innerText = gregStr;

                // هجري
                const hijriStr = getHijriDate(today);
                document.getElementById('hijriDate').innerText = hijriStr;
            }

            // ---------- 3. تحديث مواقيت الصلاة لتعز (بيانات ثابتة مع تغيير طفيف حسب التاريخ الحقيقي) ----------
            function updatePrayerTimes() {
                // نستطيع جعلها ديناميكية بناءً على وقت اليوم أو ثابتة معقولة لتعز.
                // للحصول على بيانات قريبة للواقع، نستخدم أوقاتاً افتراضية.
                // يمكن تعديلها لاحقاً.
                const baseTimes = {
                    fajr: "04:58",
                    shurooq: "06:18",
                    dhuhr: "12:06",
                    asr: "15:30",
                    maghrib: "17:54",
                    isha: "19:10"
                };

                // نضيف تأخيراً بسيطاً حسب اليوم (محاكاة لتغيير طفيف) اختياري
                const today = new Date();
                const dayOfMonth = today.getDate();
                // تعديل بسيط في حدود دقيقة لإيهام التجدد (يمكن إزالته)
                const offset = (dayOfMonth % 7) - 3; // -3 .. +3
                function applyOffset(timeStr, offsetMin) {
                    let [h, m] = timeStr.split(':').map(Number);
                    let total = h * 60 + m + offsetMin;
                    if (total < 0) total += 1440;
                    if (total >= 1440) total -= 1440;
                    h = Math.floor(total / 60);
                    m = total % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                }

                document.getElementById('fajr').innerText = applyOffset(baseTimes.fajr, offset);
                document.getElementById('shurooq').innerText = applyOffset(baseTimes.shurooq, offset);
                document.getElementById('dhuhr').innerText = applyOffset(baseTimes.dhuhr, offset-1); // تعديل بسيط
                document.getElementById('asr').innerText = applyOffset(baseTimes.asr, offset+1);
                document.getElementById('maghrib').innerText = applyOffset(baseTimes.maghrib, offset);
                document.getElementById('isha').innerText = applyOffset(baseTimes.isha, offset+2);
            }

            // ---------- 4. زر مشاركة التقويم (Web Share + نسخ احتياطي) ----------
            function shareCalendar() {
                const greg = document.getElementById('gregorianDate').innerText;
                const hij = document.getElementById('hijriDate').innerText;
                const fajr = document.getElementById('fajr').innerText;
                const shurooq = document.getElementById('shurooq').innerText;
                const dhuhr = document.getElementById('dhuhr').innerText;
                const asr = document.getElementById('asr').innerText;
                const maghrib = document.getElementById('maghrib').innerText;
                const isha = document.getElementById('isha').innerText;

                const shareText = `📅 مواقيت الصلاة في تعز - اليمن
التاريخ الميلادي: ${greg}
التاريخ الهجري: ${hij}

🕌 أوقات الصلاة:
الفجر: ${fajr}   الشروق: ${shurooq}
الظهر: ${dhuhr}   العصر: ${asr}
المغرب: ${maghrib}   العشاء: ${isha}

❄️ تقويم شتاء تعز (تساقط ثلوج رمزي)`;

                if (navigator.share && /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    // مشاركة عبر Web Share (مناسب للجوال)
                    navigator.share({
                        title: 'مواقيت الصلاة - تعز',
                        text: shareText,
                    }).catch(err => {
                        if (err.name !== 'AbortError') {
                            fallbackCopy(shareText);
                        }
                    });
                } else {
                    fallbackCopy(shareText);
                }
            }

            function fallbackCopy(text) {
                // محاولة نسخ النص إلى الحافظة
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('تم نسخ مواقيت الصلاة إلى الحافظة 👍');
                    }).catch(() => {
                        prompt('انسخ النص يدويًا:', text);
                    });
                } else {
                    prompt('انسخ النص يدويًا:', text);
                }
            }

            document.getElementById('shareCalendarBtn').addEventListener('click', shareCalendar);

            // تهيئة البيانات
            updateDates();
            updatePrayerTimes();

            // تحديث التاريخ كل دقيقة (للتأكد من دقة التاريخ عند بقاء الصفحة مفتوحة)
            setInterval(() => {
                updateDates();
                // يمكن تحديث المواقيت أيضاً حسب اليوم
                updatePrayerTimes();
            }, 60000); // كل دقيقة

            // يمكن إضافة تأثير عند تغيير التاريخ منتصف الليل (ليس ضرورياً)

        })();
    </script>
</body>
</html>
