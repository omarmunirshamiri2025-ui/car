<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعاء المستجاب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* خلفية إسلامية هادئة */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1564121211835-e88c852648a2?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            font-family: 'Amiri', serif;
            color: white;
            overflow: hidden;
        }

        .dua-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 1.5rem;
            max-width: 90%;
            width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dua-text {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #f3f4f6;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .install-btn {
            background-color: #065f46;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: bold;
            transition: all 0.3s;
            display: none; /* يظهر فقط عند توفر ميزة التثبيت */
            margin-top: 1rem;
        }

        .install-btn:hover {
            background-color: #047857;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="dua-card">
        <div class="mb-4">
            <svg class="w-12 h-12 mx-auto text-emerald-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
            </svg>
        </div>
        
        <p class="dua-text">
            "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا، وَرِزْقًا طَيِّبًا، وَعَمَلًا مُتَقَبَّلًا"
        </p>
        
        <p class="text-emerald-200 text-sm italic">
            - حصن المسلم -
        </p>

        <button id="installBtn" class="install-btn">
            تثبيت التطبيق على الجهاز
        </button>
    </div>

    <script>
        // التعامل مع ميزة التثبيت (PWA)
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // منع المتصفح من إظهار شريط التثبيت التلقائي
            e.preventDefault();
            // حفظ الحدث لاستخدامه لاحقاً
            deferredPrompt = e;
            // إظهار زر التثبيت الخاص بنا
            installBtn.style.display = 'inline-block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // إظهار نافذة التثبيت
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                }
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            installBtn.style.display = 'none';
        });

        // تفعيل الخدمة (Service Worker) للعمل بدون إنترنت
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    const CACHE_NAME = 'dua-app-v1';
                    self.addEventListener('install', (e) => {
                        e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(['./'])));
                    });
                    self.addEventListener('fetch', (e) => {
                        e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                    });
                `], { type: 'text/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl);
            });
        }
    </script>
</body>
</html>
