<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة - تعز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background: #0f172a;
            color: white;
        }

        /* Live Background with twinkling stars */
        .live-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
        }

        .active-prayer {
            background: rgba(59, 130, 246, 0.5);
            border-color: #60a5fa;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .prayer-card {
            transition: all 0.3s ease;
        }

        .share-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        #timer-box {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <div class="live-bg" id="star-container"></div>

    <div class="min-h-screen flex flex-col items-center p-4 md:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-2">مواقيت الصلاة في تعز</h1>
            <div class="flex flex-col gap-1">
                <p id="current-date-hijri" class="text-yellow-400 text-xl font-bold"></p>
                <p id="current-date-gregorian" class="text-blue-300 text-md opacity-80"></p>
            </div>
        </header>

        <!-- Next Prayer Timer -->
        <div class="glass w-full max-w-2xl p-8 text-center mb-8 prayer-card">
            <h2 class="text-xl mb-2 text-gray-300">الصلاة القادمة: <span id="next-prayer-name" class="text-white font-bold">--</span></h2>
            <div id="timer-box" class="text-5xl md:text-7xl font-bold font-mono tracking-tighter text-blue-400 my-4">00:00:00</div>
            <p class="text-sm text-gray-400 italic">يتبقى على رفع الأذان</p>
        </div>

        <!-- Prayer Times Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 w-full max-w-5xl mb-8" id="prayer-list">
            <!-- Cards will be injected by JS -->
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap justify-center gap-4 w-full max-w-2xl">
            <button onclick="shareTimes()" class="share-btn px-8 py-3 rounded-full font-bold flex items-center gap-2 hover:opacity-90 transition shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z" />
                </svg>
                مشاركة المواقيت
            </button>
            <button onclick="generateMonthly()" class="bg-white/10 hover:bg-white/20 px-8 py-3 rounded-full font-bold border border-white/20 transition backdrop-blur-sm">
                تحميل تقويم الشهر
            </button>
        </div>

        <footer class="mt-auto pt-12 pb-4 text-gray-500 text-sm">
            &copy; 2024 مواقيت الصلاة - تعز، الجمهورية اليمنية
        </footer>
    </div>

    <!-- Notification Container -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none z-50">
        تم نسخ الرابط للمشاركة!
    </div>

    <script>
        // 1. Create Animated Background Stars
        function createStars() {
            const container = document.getElementById('star-container');
            const count = 150;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                container.appendChild(star);
            }
        }

        // 2. Prayer Names and Icons
        const prayerNames = [
            { id: 'fajr', ar: 'الفجر', icon: '🌅' },
            { id: 'sunrise', ar: 'الشروق', icon: '☀️' },
            { id: 'dhuhr', ar: 'الظهر', icon: '☀️' },
            { id: 'asr', ar: 'العصر', icon: '⛅' },
            { id: 'maghrib', ar: 'المغرب', icon: '🌇' },
            { id: 'isha', ar: 'العشاء', icon: '🌙' }
        ];

        // 3. Get Mock Times for Taiz (In real app, fetch from an API)
        function getTaizPrayerTimes(date = new Date()) {
            return {
                fajr: "04:55",
                sunrise: "06:10",
                dhuhr: "12:15",
                asr: "15:35",
                maghrib: "18:18",
                isha: "19:25"
            };
        }

        // 4. Update the UI with dates and times
        function updateUI() {
            const times = getTaizPrayerTimes();
            const prayerList = document.getElementById('prayer-list');
            prayerList.innerHTML = '';
            
            const now = new Date();
            const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            // Set Dates
            const gregOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date-gregorian').innerText = now.toLocaleDateString('ar-YE', gregOptions);

            const hijriOptions = { day: 'numeric', month: 'long', year: 'numeric' };
            const hijriDate = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', hijriOptions).format(now);
            document.getElementById('current-date-hijri').innerText = hijriDate;

            let nextFound = false;
            let nextName = "الفجر (غداً)";
            let nextTimeStr = times.fajr;

            prayerNames.forEach(p => {
                const time = times[p.id];
                const isPast = time < currentTimeStr;
                const isActive = !nextFound && !isPast;

                if (isActive) {
                    nextFound = true;
                    nextName = p.ar;
                    nextTimeStr = time;
                }

                const card = document.createElement('div');
                card.className = `glass p-4 text-center prayer-card ${isActive ? 'active-prayer' : 'opacity-70'}`;
                card.innerHTML = `
                    <div class="text-2xl mb-1">${p.icon}</div>
                    <div class="text-gray-300 text-sm mb-1">${p.ar}</div>
                    <div class="text-xl font-bold">${convertTo12H(time)}</div>
                `;
                prayerList.appendChild(card);
            });

            document.getElementById('next-prayer-name').innerText = nextName;
            startTimer(nextTimeStr);
        }

        function convertTo12H(time) {
            let [h, m] = time.split(':');
            const ampm = h >= 12 ? 'م' : 'ص';
            h = h % 12 || 12;
            return `${h}:${m} ${ampm}`;
        }

        function startTimer(targetTimeStr) {
            const timerEl = document.getElementById('timer-box');
            
            function tick() {
                const now = new Date();
                const [h, m] = targetTimeStr.split(':');
                let target = new Date();
                target.setHours(h, m, 0);

                if (target < now) {
                    target.setDate(target.getDate() + 1);
                }

                const diff = target - now;
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);

                timerEl.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }

            if (window.timerInterval) clearInterval(window.timerInterval);
            window.timerInterval = setInterval(tick, 1000);
            tick();
        }

        function shareTimes() {
            const hijri = document.getElementById('current-date-hijri').innerText;
            const text = `مواقيت الصلاة في مدينة تعز لليوم (${hijri}): \n` + 
                         Object.entries(getTaizPrayerTimes()).map(([k,v]) => `${k}: ${v}`).join('\n');
            
            if (navigator.share) {
                navigator.share({
                    title: 'مواقيت الصلاة - تعز',
                    text: text,
                    url: window.location.href
                });
            } else {
                const dummy = document.createElement('textarea');
                document.body.appendChild(dummy);
                dummy.value = text + "\n" + window.location.href;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 3000);
            }
        }

        function generateMonthly() {
            alert("هذه الميزة ستتوفر قريباً لتحميل جدول كامل لشهر رمضان والأشهر الهجرية لمدينة تعز.");
        }

        // Initialize
        createStars();
        updateUI();
        setInterval(updateUI, 60000); // Refresh UI data every minute
    </script>
</body>
</html>
