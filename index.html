<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة في تعز - النسخة المحدثة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'Courier New', Courier, monospace; }

        /* أنيميشن الطيور */
        .bird {
            position: absolute;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 7s-4 4-10 4S2 7 2 7"/><path d="M2 7s4 4 10 4 10-4 10-4"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            width: 30px;
            height: 30px;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translate(-10vw, 20vh) rotate(5deg); }
            25% { transform: translate(30vw, 10vh) rotate(-5deg); }
            50% { transform: translate(60vw, 25vh) rotate(5deg); }
            75% { transform: translate(90vw, 15vh) rotate(-5deg); }
            100% { transform: translate(110vw, 20vh) rotate(5deg); }
        }

        .bird-1 { animation: fly 20s linear infinite; top: 10%; }
        .bird-2 { animation: fly 25s linear infinite reverse; top: 35%; animation-delay: 5s; }
        .bird-3 { animation: fly 18s linear infinite; top: 65%; animation-delay: 2s; }
        
        /* ترفرف الجناح */
        @keyframes flap {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
        .bird::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            animation: flap 0.5s ease-in-out infinite;
        }

        /* تحسين مظهر البطاقات */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <!-- عناصر الخلفية (الطيور) -->
    <div class="bird bird-1"></div>
    <div class="bird bird-2"></div>
    <div class="bird bird-3"></div>

    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { MapPin, RefreshCw, Moon, Sun, Calendar, Clock } = lucide;

        const TAIZ_COORDS = { lat: 13.5795, lng: 44.0108 };

        function App() {
            const [prayerTimes, setPrayerTimes] = useState(null);
            const [nextPrayer, setNextPrayer] = useState(null);
            const [timeLeft, setTimeLeft] = useState("00:00:00");
            const [currentTime, setCurrentTime] = useState(new Date());
            const [hijriDate, setHijriDate] = useState("");
            const [gregorianDate, setGregorianDate] = useState("");
            const [loading, setLoading] = useState(true);

            const prayerNames = {
                Fajr: "الفجر",
                Sunrise: "الشروق",
                Dhuhr: "الظهر",
                Asr: "العصر",
                Maghrib: "المغرب",
                Isha: "العشاء"
            };

            useEffect(() => {
                fetchPrayerTimes();
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (prayerTimes) calculateNextPrayer();
            }, [currentTime, prayerTimes]);

            const fetchPrayerTimes = async () => {
                setLoading(true);
                try {
                    // طريقة 1 (كراتشي) - الأنسب لليمن
                    const res = await fetch(`https://api.aladhan.com/v1/timings/${Math.floor(Date.now() / 1000)}?latitude=${TAIZ_COORDS.lat}&longitude=${TAIZ_COORDS.lng}&method=1`);
                    const data = await res.json();
                    
                    setPrayerTimes(data.data.timings);
                    
                    // استخراج التاريخ الهجري والميلادي من الاستجابة
                    const hijri = data.data.date.hijri;
                    const greg = data.data.date.gregorian;
                    
                    setHijriDate(`${hijri.day} ${hijri.month.ar} ${hijri.year} هـ`);
                    setGregorianDate(`${greg.day} ${greg.month.en} ${greg.year} م`);
                    
                } catch (err) {
                    console.error("Fetch error", err);
                } finally {
                    setLoading(false);
                }
            };

            const calculateNextPrayer = () => {
                const now = currentTime;
                const list = Object.keys(prayerNames).map(key => {
                    const [h, m] = prayerTimes[key].split(':');
                    const d = new Date();
                    d.setHours(parseInt(h), parseInt(m), 0);
                    return { name: key, date: d, timeStr: prayerTimes[key] };
                });

                let next = list.find(p => p.date > now);
                if (!next) {
                    next = { ...list[0], date: new Date(list[0].date.getTime() + 86400000) };
                }

                setNextPrayer(next);
                const diff = next.date - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                setTimeLeft(`${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`);
            };

            if (loading) return (
                <div className="flex items-center justify-center h-screen">
                    <div className="text-emerald-500 animate-pulse font-bold">جاري ضبط التوقيت والتواريخ لتعز...</div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-6 min-h-screen">
                    <div className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-2 bg-emerald-500/10 px-4 py-2 rounded-full border border-emerald-500/20 backdrop-blur-sm">
                            <i data-lucide="map-pin" className="w-4 h-4 text-emerald-400"></i>
                            <span className="text-xs font-bold text-emerald-100">تعز، اليمن</span>
                        </div>
                        <button onClick={fetchPrayerTimes} className="p-2 hover:rotate-180 transition-all duration-500 bg-white/5 rounded-full">
                            <i data-lucide="refresh-cw" className="w-5 h-5 text-slate-400"></i>
                        </button>
                    </div>

                    <div className="text-center mb-8">
                        <p className="text-slate-400 text-xs mb-2">الوقت المتبقي لـ {nextPrayer ? prayerNames[nextPrayer.name] : '...'}</p>
                        <h1 className="text-7xl font-black font-mono tracking-tighter drop-shadow-lg mb-4">{timeLeft}</h1>
                        
                        {/* عرض التاريخ الهجري والميلادي */}
                        <div className="flex flex-col gap-1 items-center justify-center bg-white/5 py-3 rounded-2xl border border-white/5 backdrop-blur-md">
                            <div className="flex items-center gap-2 text-emerald-400 font-bold tracking-wide">
                                <i data-lucide="calendar" className="w-4 h-4"></i>
                                <span>{hijriDate}</span>
                            </div>
                            <div className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">
                                {gregorianDate}
                            </div>
                        </div>
                    </div>

                    <div className="grid gap-3">
                        {Object.keys(prayerNames).map(key => {
                            const isNext = nextPrayer?.name === key;
                            return (
                                <div key={key} className={`flex items-center justify-between p-5 rounded-3xl border transition-all backdrop-blur-sm ${isNext ? 'bg-emerald-600/90 border-emerald-400 shadow-xl scale-[1.02]' : 'glass-card'}`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`p-3 rounded-2xl ${isNext ? 'bg-white/20' : 'bg-slate-800'}`}>
                                            <i data-lucide={key === 'Sunrise' ? 'sun' : (key === 'Fajr' || key === 'Isha' ? 'moon' : 'sun')} className="w-6 h-6"></i>
                                        </div>
                                        <div className="flex flex-col">
                                            <span className="text-lg font-bold">{prayerNames[key]}</span>
                                            <span className={`text-[9px] uppercase tracking-widest ${isNext ? 'text-emerald-100' : 'text-slate-500'}`}>{key}</span>
                                        </div>
                                    </div>
                                    <span className={`text-2xl font-black font-mono ${isNext ? 'text-white' : 'text-emerald-500'}`}>{prayerTimes[key]}</span>
                                </div>
                            );
                        })}
                    </div>
                    
                    <footer className="mt-8 p-4 bg-blue-500/5 border border-white/5 rounded-2xl text-[10px] text-slate-500 text-center leading-relaxed">
                        <p>تم تحديث التقويم لليوم: {gregorianDate}</p>
                        <p className="mt-1">دقة عالية بناءً على إحداثيات مدينة تعز</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // إعادة تهيئة الأيقونات
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
