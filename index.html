<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="background-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="أوقات الصلاة">
    <meta name="description" content="تطبيق مواقيت الصلاة في اليمن - يعمل بدون إنترنت">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>أوقات الصلاة - اليمن</title>
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%230f172a'/%3E%3Cpath d='M50 20 L50 80 M30 35 Q50 20 70 35 M30 65 Q50 80 70 65' stroke='%23fbbf24' stroke-width='4' fill='none'/%3E%3Ccircle cx='50' cy='50' r='8' fill='%23fbbf24'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230f172a' rx='40'/%3E%3Cpath d='M90 40 L90 140 M60 65 Q90 40 120 65 M60 115 Q90 140 120 115' stroke='%23fbbf24' stroke-width='8' fill='none'/%3E%3Ccircle cx='90' cy='90' r='15' fill='%23fbbf24'/%3E%3C/svg%3E">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #fbbf24;
            --accent-dark: #f59e0b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Background Pattern */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(251, 191, 36, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Install Banner */
        .install-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: var(--primary);
            padding: 12px 20px;
            z-index: 1000;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .install-banner.show {
            transform: translateY(0);
        }

        .install-banner button {
            background: var(--primary);
            color: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Header */
        .header {
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(251, 191, 36, 0.3);
        }

        .logo i {
            font-size: 40px;
            color: var(--primary);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Main Card */
        .main-card {
            background: var(--secondary);
            margin: 0 20px 20px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        /* Location Selector */
        .location-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .location-btn {
            flex: 1;
            background: rgba(251, 191, 36, 0.1);
            border: 2px solid rgba(251, 191, 36, 0.3);
            color: var(--accent);
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .location-btn:hover, .location-btn.active {
            background: var(--accent);
            color: var(--primary);
        }

        .location-btn i {
            font-size: 18px;
        }

        /* Next Prayer */
        .next-prayer {
            text-align: center;
            padding: 20px 0;
        }

        .next-prayer-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .next-prayer-name {
            font-size: 42px;
            font-weight: 900;
            color: var(--accent);
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
        }

        .countdown {
            font-size: 48px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            direction: ltr;
            display: inline-block;
        }

        .countdown span {
            display: inline-block;
            min-width: 60px;
        }

        .countdown-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Date Display */
        .date-display {
            text-align: center;
            margin: 20px 0;
            padding: 16px;
            background: rgba(251, 191, 36, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        .date-display .hijri {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .date-display .gregorian {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Prayer Times Grid */
        .prayer-times {
            display: grid;
            gap: 12px;
        }

        .prayer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .prayer-item.active {
            background: rgba(251, 191, 36, 0.15);
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .prayer-item.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
        }

        .prayer-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .prayer-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(255,255,255,0.05);
        }

        .prayer-item.active .prayer-icon {
            background: var(--accent);
            color: var(--primary);
        }

        .prayer-name {
            font-weight: 700;
            font-size: 16px;
        }

        .prayer-time {
            font-size: 24px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            direction: ltr;
        }

        .prayer-item.active .prayer-time {
            color: var(--accent);
            font-weight: 700;
        }

        /* Settings Panel */
        .settings-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 56px;
            height: 56px;
            background: var(--secondary);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 50%;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .city-list {
            display: grid;
            gap: 8px;
        }

        .city-btn {
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            text-align: right;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .city-btn:hover, .city-btn.active {
            background: rgba(251, 191, 36, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .city-btn.active::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        /* Notification Toggle */
        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle-switch {
            width: 52px;
            height: 28px;
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            right: 2px;
            transition: all 0.3s;
        }

        .toggle-switch.active::after {
            right: 26px;
        }

        /* Offline Indicator */
        .offline-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--danger);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 500;
        }

        .offline-indicator.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .animate-pulse {
            animation: pulse 2s infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .container {
                max-width: 600px;
                margin: 0 auto;
            }
        }

        /* Loading State */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- Install Banner -->

    <div class="container">

            <!-- Date Display -->
            <div class="date-display">
                <div class="hijri" id="hijriDate">-</div>

            <!-- Next Prayer -->
            <div class="next-prayer">

                    <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>

        </div>

        <!-- Prayer Times -->
        <div class="main-card">
            <div class="prayer-times" id="prayerTimes">

            </div>
        </div>
    </div>

    <!-- Settings Button -->
    <button class="settings-btn" onclick="openSettings()">
        <i class="fas fa-cog"></i>
    </button>

    <!-- City Modal -->
    <div class="modal" id="cityModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>اختر المدينة</h3>
                <button class="close-btn" onclick="closeModal('cityModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="city-list" id="cityList">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>الإعدادات</h3>
                <button class="close-btn" onclick="closeModal('settingsModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="toggle-item">
                    <div class="toggle-label">
                        <i class="fas fa-bell" style="color: var(--accent);"></i>
                        <span>تنبيهات الأذان</span>
                    </div>
                    <div class="toggle-switch" id="notificationToggle" onclick="toggleNotifications()"></div>
                </div>
                
                <div class="toggle-item">
                    <div class="toggle-label">
                        <i class="fas fa-volume-up" style="color: var(--accent);"></i>
                        <span>صوت الأذان</span>
                    </div>
                    <div class="toggle-switch active" id="soundToggle" onclick="toggleSound()"></div>
                </div>

                <div class="toggle-item">
                    <div class="toggle-label">
                        <i class="fas fa-moon" style="color: var(--accent);"></i>
                        <span>الوضع الليلي</span>
                    </div>
                    <div class="toggle-switch active" id="darkModeToggle" onclick="toggleDarkMode()"></div>
                </div>

                <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <button onclick="requestNotificationPermission()" style="width: 100%; padding: 16px; background: rgba(251, 191, 36, 0.1); border: 1px solid var(--accent); color: var(--accent); border-radius: 12px; cursor: pointer; font-weight: 600;">
                        <i class="fas fa-bell-slash" style="margin-left: 8px;"></i>
                        تفعيل الإشعارات
                    </button>
                </div>

                <div style="margin-top: 16px; text-align: center; color: var(--text-muted); font-size: 12px;">
                    الإصدار 1.0.0 • يعمل بدون إنترنت
                </div>
            </div>
        </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                const CACHE_NAME = 'prayer-times-yemen-v1';
                const urlsToCache = [
                    '/',
                    'index.html'
                ];

                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME)
                            .then(cache => cache.addAll(urlsToCache))
                    );
                    self.skipWaiting();
                });

                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request)
                            .then(response => {
                                if (response) return response;
                                return fetch(event.request);
                            })
                    );
                });
            `)).then(registration => {
                console.log('ServiceWorker registered');
            }).catch(error => {
                console.log('ServiceWorker registration failed');
            });
        }
    </script>

            sound: true
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            setupInstallPrompt();
            setupOfflineDetection();
        });

        function initApp() {
            renderCityList();
            loadPrayerTimes();
            updateDate();
            
            // Update every second
            setInterval(() => {
                updateCountdown();
            }, 1000);

            // Update prayer times at midnight
            setInterval(() => {
                loadPrayerTimes();
                updateDate();
            }, 60000);
        }

        // Calculate Prayer Times using Sun Position
        function calculatePrayerTimes(lat, lng, date) {
            const times = {};
            
            // Simplified calculation for Yemen (Muslim World League method)
            const julianDate = (date.getTime() / 86400000) - (date.getTimezoneOffset() / 1440) + 2440587.5;
            const sunDeclination = getSunDeclination(julianDate);
            const equationOfTime = getEquationOfTime(julianDate);
            
            // Calculate times
            const dhuhr = 12 + (4 * lng / 60) - equationOfTime;
            
            // Fajr: sun angle -18°
            const fajrAngle = -18;
            const fajrHourAngle = getHourAngle(lat, sunDeclination, fajrAngle);
            times.fajr = dhuhr - (fajrHourAngle / 15);
            
            // Sunrise: sun angle -0.833°
            const sunriseAngle = -0.833;
            const sunriseHourAngle = getHourAngle(lat, sunDeclination, sunriseAngle);
            times.sunrise = dhuhr - (sunriseHourAngle / 15);
            
            // Asr: shadow length = object height + shadow at noon (Hanafi: 2x, Shafi: 1x)
            const asrAngle = Math.atan(1 / (Math.tan(Math.abs(lat - sunDeclination) * Math.PI / 180) + 1));
            const asrHourAngle = getHourAngle(lat, sunDeclination, -asrAngle * 180 / Math.PI);
            times.asr = dhuhr + (asrHourAngle / 15);
            
            // Maghrib: sun angle -0.833°
            const maghribHourAngle = getHourAngle(lat, sunDeclination, -0.833);
            times.maghrib = dhuhr + (maghribHourAngle / 15);
            
            // Isha: sun angle -17° (or -18°)
            const ishaAngle = -17;
            const ishaHourAngle = getHourAngle(lat, sunDeclination, ishaAngle);
            times.isha = dhuhr + (ishaHourAngle / 15);
            
            // Dhuhr
            times.dhuhr = dhuhr;
            
            // Convert to time strings
            const result = {};
            for (let [key, value] of Object.entries(times)) {
                const hours = Math.floor(value);
                const minutes = Math.floor((value - hours) * 60);
                result[key] = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            }
            
            return result;
        }

        function getSunDeclination(julianDate) {
            const n = julianDate - 2451545.0;
            const L = (280.460 + 0.9856474 * n) % 360;
            const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;
            const lambda = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
            const epsilon = (23.439 - 0.0000004 * n) * Math.PI / 180;
            return Math.asin(Math.sin(epsilon) * Math.sin(lambda)) * 180 / Math.PI;
        }

        function getEquationOfTime(julianDate) {
            const n = julianDate - 2451545.0;
            const L = (280.460 + 0.9856474 * n) % 360;
            const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;
            const lambda = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
            const epsilon = (23.439 - 0.0000004 * n) * Math.PI / 180;
            const y = Math.tan(epsilon / 2) ** 2;
            const sin2L0 = Math.sin(2 * L * Math.PI / 180);
            const cos2L0 = Math.cos(2 * L * Math.PI / 180);
            const sin4L0 = Math.sin(4 * L * Math.PI / 180);
            const E = y * sin2L0 - 2 * 0.0167 * Math.sin(g) + 4 * 0.0167 * y * Math.sin(g) * cos2L0 - 0.5 * y ** 2 * sin4L0;
            return E * 229.18;
        }

        function getHourAngle(lat, declination, angle) {
            const latRad = lat * Math.PI / 180;
            const decRad = declination * Math.PI / 180;
            const angleRad = angle * Math.PI / 180;
            return Math.acos((Math.sin(angleRad) - Math.sin(latRad) * Math.sin(decRad)) / (Math.cos(latRad) * Math.cos(decRad))) * 180 / Math.PI;
        }

        function loadPrayerTimes() {
            const city = cities[state.currentCity];
            if (!city) return;

            const now = new Date();
            state.prayerTimes = calculatePrayerTimes(city.lat, city.lng, now);
            
            document.getElementById('selectedCity').textContent = city.name;
            document.getElementById('currentCity').textContent = `مواقيت صلاة ${city.name}`;
            
            renderPrayerTimes();
            findNextPrayer();
        }

        function renderPrayerTimes() {
            const container = document.getElementById('prayerTimes');
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            let html = '';
            for (let [key, time] of Object.entries(state.prayerTimes)) {
                if (key === 'sunrise') continue; // Skip sunrise in main list
                
                const info = prayerNames[key];
                const isActive = time === state.nextPrayer?.time;
                
                html += `
                    <div class="prayer-item ${isActive ? 'active' : ''}" data-prayer="${key}">
                        <div class="prayer-info">
                            <div class="prayer-icon" style="color: ${info.color}">
                                <i class="fas ${info.icon}"></i>
                            </div>
                            <div class="prayer-name">${info.name}</div>
                        </div>
                        <div class="prayer-time">${time}</div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        function findNextPrayer() {
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            
            let nextPrayer = null;
            let minDiff = Infinity;
            
            for (let [key, time] of Object.entries(state.prayerTimes)) {
                if (key === 'sunrise') continue;
                
                const [hours, minutes] = time.split(':').map(Number);
                const prayerMinutes = hours * 60 + minutes;
                let diff = prayerMinutes - currentMinutes;
                
                if (diff < 0) diff += 24 * 60; // Next day
                
                if (diff < minDiff) {
                    minDiff = diff;
                    nextPrayer = { name: prayerNames[key].name, time: time, key: key };
                }
            }
            
            state.nextPrayer = nextPrayer;
            document.getElementById('nextPrayerName').textContent = nextPrayer.name;
        }

        function updateCountdown() {
            if (!state.nextPrayer) return;
            
            const now = new Date();
            const [hours, minutes] = state.nextPrayer.time.split(':').map(Number);
            const target = new Date();
            target.setHours(hours, minutes, 0);
            
            if (target < now) {
                target.setDate(target.getDate() + 1);
            }
            
            const diff = target - now;
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');
            
            // Check if it's time for adhan
            if (h === 0 && m === 0 && s === 0) {
                triggerAdhan();
            }
        }

        function updateDate() {
            const now = new Date();
            
            // Gregorian date
            const gregorianOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('gregorianDate').textContent = now.toLocaleDateString('ar-SA', gregorianOptions);
            
            // Hijri date (approximation)
            const hijriDate = getHijriDate(now);
            document.getElementById('hijriDate').textContent = hijriDate;
        }

        function getHijriDate(date) {
            // Approximate Hijri date calculation
            const hijriEpoch = 1948440; // Julian day of 1 Muharram 1 AH
            const jd = date.getTime() / 86400000 + 2440587.5;
            const hijriDays = Math.floor(jd - hijriEpoch);
            const hijriYear = Math.floor(hijriDays / 354.367) + 1;
            const hijriDayOfYear = hijriDays % 354.367;
            
            const months = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الثاني', 'جمادى الأولى', 'جمادى الآخرة', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];
            const monthLengths = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29];
            
            let month = 0;
            let day = hijriDayOfYear;
            
            for (let i = 0; i < 12; i++) {
                if (day < monthLengths[i]) {
                    month = i;
                    break;
                }
                day -= monthLengths[i];
            }
            
            return `${Math.floor(day) + 1} ${months[month]} ${hijriYear} هـ`;
        }

        function renderCityList() {
            const container = document.getElementById('cityList');
            container.innerHTML = Object.entries(cities).map(([key, city]) => `
                <button class="city-btn ${key === state.currentCity ? 'active' : ''}" onclick="selectCity('${key}')">
                    <span>${city.name}</span>
                </button>
            `).join('');
        }

        function selectCity(cityKey) {
            state.currentCity = cityKey;
            localStorage.setItem('selectedCity', cityKey);
            loadPrayerTimes();
            closeModal('cityModal');
            showToast(`تم اختيار ${cities[cityKey].name}`);
        }

        function getLocation() {
            if (!navigator.geolocation) {
                showToast('المتصفح لا يدعم تحديد الموقع');
                return;
            }
            
            showToast('جاري تحديد موقعك...');
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    const nearestCity = findNearestCity(latitude, longitude);
                    selectCity(nearestCity);
                },
                (error) => {
                    showToast('تعذر تحديد الموقع');
                }
            );
        }

        function findNearestCity(lat, lng) {
            let nearest = 'sanaa';
            let minDistance = Infinity;
            
            for (let [key, city] of Object.entries(cities)) {
                const distance = Math.sqrt((city.lat - lat) ** 2 + (city.lng - lng) ** 2);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearest = key;
                }
            }
            
            return nearest;
        }

        // Modal Functions
        function openCityModal() {
            document.getElementById('cityModal').classList.add('active');
            renderCityList();
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // Toggles
        function toggleNotifications() {
            const toggle = document.getElementById('notificationToggle');
            toggle.classList.toggle('active');
            state.notifications = toggle.classList.contains('active');
            
            if (state.notifications) {
                requestNotificationPermission();
            }
        }

        function toggleSound() {
            const toggle = document.getElementById('soundToggle');
            toggle.classList.toggle('active');
            state.sound = toggle.classList.contains('active');
        }

        function toggleDarkMode() {
            // Already dark by default, could add light mode in future
            showToast('الوضع الليلي مفعل');
        }

        // Notifications
        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                showToast('متصفحك لا يدعم الإشعارات');
                return;
            }
            
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    document.getElementById('notificationToggle').classList.add('active');
                    state.notifications = true;
                    showToast('تم تفعيل الإشعارات');
                    scheduleNotifications();
                } else {
                    showToast('تم رفض الإشعارات');
                }
            });
        }

        function scheduleNotifications() {
            if (!state.notifications || !state.prayerTimes) return;
            
            // Schedule notification for next prayer
            const now = new Date();
            const [hours, minutes] = state.nextPrayer.time.split(':').map(Number);
            const prayerTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes);
            
            if (prayerTime > now) {
                const timeout = prayerTime - now;
                setTimeout(() => {
                    new Notification(`حان وقت صلاة ${state.nextPrayer.name}`, {
                        body: `الآن ${state.nextPrayer.time}`,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🕌</text></svg>'
                    });
                }, timeout);
            }
        }

        function triggerAdhan() {
            if (state.sound) {
                // Play adhan sound (would need audio file)
                showToast(`حان وقت صلاة ${state.nextPrayer.name}`);
            }
            
            if (state.notifications && 'Notification' in window && Notification.permission === 'granted') {
                new Notification(`حان وقت صلاة ${state.nextPrayer.name}`, {
                    body: 'حان الآن موعد الأذان',
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🕌</text></svg>'
                });
            }
        }

        // PWA Install
        let deferredPrompt;
        
        function setupInstallPrompt() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('installBanner').classList.add('show');
            });
            
            window.addEventListener('appinstalled', () => {
                document.getElementById('installBanner').classList.remove('show');
                deferredPrompt = null;
                showToast('تم تثبيت التطبيق بنجاح');
            });
        }

        function installApp() {
            if (!deferredPrompt) {
                showToast('التطبيق مثبت بالفعل أو غير مدعوم');
                return;
            }
            
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted install');
                }
                deferredPrompt = null;
            });
        }

        // Offline Detection
        function setupOfflineDetection() {
            const indicator = document.getElementById('offlineIndicator');
            
            function updateOnlineStatus() {
                if (navigator.onLine) {
                    indicator.classList.remove('show');
                } else {
                    indicator.classList.add('show');
                    showToast('التطبيق يعمل بدون إنترنت');
                }
            }
            
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        }

        // Toast
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--secondary);
                color: var(--text);
                padding: 16px 24px;
                border-radius: 50px;
                border: 1px solid var(--accent);
                z-index: 3000;
                font-weight: 600;
                animation: fadeIn 0.3s;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Close modals on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            }
        });
    </script>
</body>
