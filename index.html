<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد QR Code (بدون إنترنت)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- استيراد مكتبة QR Code من مصدر موثوق -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="manifest" id="manifest">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8fafc;
        }

        #qrcode img {
            margin: 0 auto;
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #1e293b;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 50;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            transition: 0.3s;
        }

        #toast.show {
            visibility: visible;
            bottom: 50px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-xl text-center my-8">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">مولد QR Code الذكي</h1>
        <p class="text-slate-600 italic text-sm">حول أي رابط إلى رمز استجابة سريعة فوراً وبدون إنترنت.</p>
        <button id="installBtn" class="hidden mt-4 bg-emerald-600 text-white px-6 py-2 rounded-full shadow-md hover:bg-emerald-700 transition-all font-medium">
            تثبيت التطبيق على الجهاز
        </button>
    </header>

    <main class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-6 border border-slate-100">
        
        <div class="space-y-6">
            <!-- Input Area -->
            <div>
                <label for="textInput" class="block text-sm font-bold text-slate-700 mb-2">أدخل الرابط أو النص:</label>
                <textarea id="textInput" 
                    placeholder="https://example.com" 
                    class="w-full h-28 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 resize-none input-focus outline-none transition-all"
                ></textarea>
            </div>

            <!-- Color Options -->
            <div class="flex items-center justify-between gap-4 p-3 bg-slate-50 rounded-2xl">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-slate-500 mb-1">لون الرمز:</span>
                    <input type="color" id="fgColor" value="#000000" class="h-8 w-12 rounded cursor-pointer">
                </div>
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-slate-500 mb-1">الخلفية:</span>
                    <input type="color" id="bgColor" value="#ffffff" class="h-8 w-12 rounded cursor-pointer">
                </div>
            </div>

            <!-- Generate Button -->
            <button id="generateBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 transition-all active:scale-95">
                توليد الرمز الآن
            </button>

            <!-- Result Display -->
            <div id="resultSection" class="hidden flex flex-col items-center space-y-4 pt-4 border-t border-slate-100">
                <div id="qrcode" class="p-2"></div>
                
                <div class="flex gap-2 w-full">
                    <button id="downloadBtn" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-medium text-sm flex items-center justify-center gap-2 hover:bg-slate-900 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        حفظ كصورة
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-8 text-center text-slate-400 text-xs">
        <p>يعمل محلياً بالكامل | لا يتم تخزين بياناتك</p>
    </footer>

    <div id="toast">تم توليد الرمز!</div>

    <script>
        const textInput = document.getElementById('textInput');
        const generateBtn = document.getElementById('generateBtn');
        const qrcodeContainer = document.getElementById('qrcode');
        const resultSection = document.getElementById('resultSection');
        const downloadBtn = document.getElementById('downloadBtn');
        const fgColor = document.getElementById('fgColor');
        const bgColor = document.getElementById('bgColor');
        const toast = document.getElementById('toast');
        const installBtn = document.getElementById('installBtn');

        let qrcodeInstance = null;

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateQR() {
            const text = textInput.value.trim();
            if (!text) {
                showToast("يرجى إدخال نص أولاً");
                return;
            }

            // Clear previous
            qrcodeContainer.innerHTML = "";
            resultSection.classList.remove('hidden');

            // Generate new QR
            qrcodeInstance = new QRCode(qrcodeContainer, {
                text: text,
                width: 256,
                height: 256,
                colorDark : fgColor.value,
                colorLight : bgColor.value,
                correctLevel : QRCode.CorrectLevel.H
            });

            showToast("تم توليد الرمز بنجاح");
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        generateBtn.onclick = generateQR;

        downloadBtn.onclick = () => {
            const img = qrcodeContainer.querySelector('img');
            if (img) {
                const link = document.createElement('a');
                link.download = 'qrcode-export.png';
                link.href = img.src;
                link.click();
            }
        };

        // PWA logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.classList.add('hidden');
                deferredPrompt = null;
            }
        });

        // Dynamic Manifest for PWA
        const manifestData = {
            "name": "مولد QR الذكي",
            "short_name": "QR-Offline",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f8fafc",
            "theme_color": "#2563eb",
            "icons": [{
                "src": "https://cdn-icons-png.flaticon.com/512/714/714390.png",
                "sizes": "512x512",
                "type": "image/png"
            }]
        };
        const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
        document.getElementById('manifest').setAttribute('href', URL.createObjectURL(blob));

        // Register dummy SW for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGUgPT4gZS5yZXNwb25kd2l0aChmZXRjaChlLnJlcXVlc3QpKSk7');
        }
    </script>
</body>
</html>
