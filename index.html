<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a2f3f">

  <meta name="apple-mobile-web-app-title" content="مواقيت تعز">
  <!-- manifest ثابت (مشفر) -->
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%D9%85%D9%88%D8%A7%D9%82%D9%8A%D8%AA%20%D8%AA%D8%B9%D8%B2%22%2C%22short_name%22%3A%22%D9%85%D9%88%D8%A7%D9%82%D9%8A%D8%AA%20%D8%AA%D8%B9%D8%B2%22%2C%22description%22%3A%22%D9%85%D9%88%D8%A7%D9%82%D9%8A%D8%AA%20%D8%A7%D9%84%D8%B5%D9%84%D8%A7%D8%A9%20%D9%88%D8%A7%D9%84%D8%AA%D9%82%D9%88%D9%8A%D9%85%20%D8%A7%D9%84%D9%87%D8%AC%D8%B1%D9%8A%20%D9%81%D9%8A%20%D8%AA%D8%B9%D8%B2%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22theme_color%22%3A%22%231a2f3f%22%2C%22background_color%22%3A%22%2316222e%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%253Crect%20width%3D%27100%27%20height%3D%27100%27%20fill%3D%27%25231a2f3f%27%2F%3E%253Ctext%20x%3D%2750%27%20y%3D%2775%27%20font-size%3D%2770%27%20text-anchor%3D%27middle%27%20fill%3D%27%2523ffffff%27%20font-family%3D%27system-ui%27%3E%25F0%259F%258C%2599%3C%2Ftext%3E%253C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%2C%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%3E%253Crect%20width%3D%27100%27%20height%3D%27100%27%20fill%3D%27%25231a2f3f%27%2F%3E%253Ctext%20x%3D%2750%27%20y%3D%2775%27%20font-size%3D%2770%27%20text-anchor%3D%27middle%27%20fill%3D%27%2523ffffff%27%20font-family%3D%27system-ui%27%3E%25F0%259F%258C%2599%3C%2Ftext%3E%253C%2Fsvg%3E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <!-- أيقونات Apple -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a2f3f'/%3E%3Ctext x='50' y='75' font-size='70' text-anchor='middle' fill='%23ffffff' font-family='system-ui'%3E🌙%3C/text%3E%3C/svg%3E">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a2f3f'/%3E%3Ctext x='50' y='75' font-size='70' text-anchor='middle' fill='%23ffffff' font-family='system-ui'%3E🌙%3C/text%3E%3C/svg%3E">
  <title>مواقيت تعز · تطبيق التقويم</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Amiri', 'Cairo', sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a2f3f 0%, #16222e 100%);
      position: relative;
      overflow-x: hidden;
      color: #e7f0fd;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      overscroll-behavior: none;
    }
    #snow-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .main-card {
      position: relative;
      z-index: 10;
      background: rgba(10, 25, 40, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2.5rem 1rem 2.5rem 1rem;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), 0 0 0 1px rgba(200,230,255,0.2) inset;
      max-width: 800px;
      width: 100%;
      padding: 1.8rem 1.5rem;
      transition: 0.3s;
    }
    .header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      text-shadow: 0 0 6px #8fcbff, 0 0 20px #3e6c9e;
      color: #f0f9ff;
      border-bottom: 1px dashed #7fa9c9;
      padding-bottom: 0.6rem;
      display: inline-block;
    }
    .header h1 span {
      font-size: 1.2rem;
      background: #2c4b6c;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      margin-right: 0.5rem;
      font-weight: 300;
    }
    .date-compact {
      display: flex;
      justify-content: space-between;
      background: rgba(0,20,40,0.7);
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin: 1.5rem 0 2rem 0;
      border: 1px solid #5688b7;
      box-shadow: 0 4px 10px rgba(0,10,20,0.6);
      font-size: 1.1rem;
    }
    .gregorian, .hijri {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-em {
      font-size: 1.8rem;
    }
    .prayer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.9rem;
      margin: 2rem 0 2.2rem;
    }
    .prayer-item {
      background: rgba(12,30,48,0.8);
      border-radius: 2rem 0.5rem 2rem 0.5rem;
      padding: 0.9rem 0.3rem;
      text-align: center;
      border: 1px solid #4f7ea3;
      box-shadow: 0 5px 0 #0d1f2c;
      transition: 0.15s;
      backdrop-filter: blur(4px);
    }
    .prayer-item:active { transform: scale(0.97); }
    .prayer-name { font-size: 1.3rem; font-weight: 400; color: #d3eaff; }
    .prayer-time {
      font-size: 1.9rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ecf9ff, #c9e2f5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .share-area {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2.5rem 0 1rem;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .share-btn, #installBtn {
      background: linear-gradient(145deg, #1f4b6e, #0f2f4a);
      border: 1px solid #87b9de;
      color: #f0f9ff;
      font-size: 1.3rem;
      font-weight: 300;
      padding: 0.8rem 2rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #0a1925, 0 8px 16px rgba(0,0,0,0.5);
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      transition: 0.08s ease-out;
      border: none;
      outline: none;
    }
    .share-btn:active, #installBtn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #0a1925, 0 5px 12px black;
    }
    #installBtn {
      background: linear-gradient(145deg, #2a5f48, #1a3e30);
      border-color: #8fc9b0;
    }
    .footer-note {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 2rem;
      border-top: 1px dashed #31638b;
      padding-top: 1rem;
    }
    @media (max-width:480px) {
      .main-card { padding: 1.2rem; }
      .prayer-time { font-size: 1.6rem; }
      .date-compact { flex-direction: column; align-items: center; gap: 10px; }
      .share-btn, #installBtn { font-size: 1.1rem; padding: 0.7rem 1.5rem; }
    }
  </style>
</head>
<body>

  <canvas id="snow-container"></canvas>

  <main class="main-card">
    <div class="header">
      <h1>🌙 تعز <span>اليمن</span></h1>
    </div>

    <div class="date-compact" id="dateDisplay">
      <div class="gregorian"><span class="icon-em">📅</span> <span id="gregorianDate">--</span></div>
      <div class="hijri"><span class="icon-em">☪️</span> <span id="hijriDate">--</span></div>
    </div>

    <div class="prayer-grid" id="prayerTimes">
      <div class="prayer-item"><div class="prayer-name">الفجر</div><div class="prayer-time" id="fajr">04:58</div></div>
      <div class="prayer-item"><div class="prayer-name">الشروق</div><div class="prayer-time" id="shurooq">06:18</div></div>
      <div class="prayer-item"><div class="prayer-name">الظهر</div><div class="prayer-time" id="dhuhr">12:06</div></div>
      <div class="prayer-item"><div class="prayer-name">العصر</div><div class="prayer-time" id="asr">15:30</div></div>
      <div class="prayer-item"><div class="prayer-name">المغرب</div><div class="prayer-time" id="maghrib">17:54</div></div>
      <div class="prayer-item"><div class="prayer-name">العشاء</div><div class="prayer-time" id="isha">19:10</div></div>
    </div>

    <div class="share-area">
      <button class="share-btn" id="shareCalendarBtn"><span class="icon-em">📆</span> مشاركة التقويم</button>
      <button id="installBtn" style="display: none;"><span class="icon-em">📲</span> تثبيت التطبيق</button>
    </div>

    <div class="footer-note">❄️ تساقط الثلوج يحاكي أجواء شتاء تعز ❄️</div>
  </main>

  <script>
    (function() {
      // ---------- 1. خلفية الثلج ----------
      const canvas = document.getElementById('snow-container');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];

      function initCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        createParticles(200);
      }

      function createParticles(count) {
        particles = [];
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 4 + 1,
            speedY: Math.random() * 1.3 + 0.4,
            speedX: Math.random() * 0.4 - 0.2,
            opacity: Math.random() * 0.6 + 0.3
          });
        }
      }

      function drawSnow() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#f0f9ff';
        for (let p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
          ctx.fill();
        }
      }

      function updateSnow() {
        for (let p of particles) {
          p.y += p.speedY;
          p.x += p.speedX;
          if (p.y > height + 10) { p.y = -10; p.x = Math.random() * width; }
          if (p.x > width + 10) p.x = -10;
          if (p.x < -10) p.x = width + 10;
        }
      }

      function animateSnow() {
        updateSnow();
        drawSnow();
        requestAnimationFrame(animateSnow);
      }

      window.addEventListener('resize', initCanvas);
      initCanvas();
      animateSnow();

      // ---------- 2. التاريخ الميلادي والهجري ----------
      function getHijriDate(date) {
        try {
          const formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {
            day: 'numeric', month: 'long', year: 'numeric'
          });
          return formatter.format(date);
        } catch {
          return "1 رمضان 1445 (تقريبي)";
        }
      }

      function updateDates() {
        const today = new Date();
        const greg = today.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('gregorianDate').innerText = greg;
        document.getElementById('hijriDate').innerText = getHijriDate(today);
      }

      // ---------- 3. تحديث مواقيت الصلاة (تعديل بسيط) ----------
      function updatePrayerTimes() {
        const base = { fajr: "04:58", shurooq: "06:18", dhuhr: "12:06", asr: "15:30", maghrib: "17:54", isha: "19:10" };
        const offset = (new Date().getDate() % 7) - 3; // -3..+3
        const apply = (t, o) => {
          let [h, m] = t.split(':').map(Number);
          let total = h * 60 + m + o;
          if (total < 0) total += 1440;
          if (total >= 1440) total -= 1440;
          return `${Math.floor(total/60).toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
        };
        document.getElementById('fajr').innerText = apply(base.fajr, offset);
        document.getElementById('shurooq').innerText = apply(base.shurooq, offset);
        document.getElementById('dhuhr').innerText = apply(base.dhuhr, offset-1);
        document.getElementById('asr').innerText = apply(base.asr, offset+1);
        document.getElementById('maghrib').innerText = apply(base.maghrib, offset);
        document.getElementById('isha').innerText = apply(base.isha, offset+2);
      }

      // ---------- 4. مشاركة التقويم ----------
      document.getElementById('shareCalendarBtn').addEventListener('click', () => {
        const greg = document.getElementById('gregorianDate').innerText;
        const hij = document.getElementById('hijriDate').innerText;
        const f = document.getElementById('fajr').innerText;
        const s = document.getElementById('shurooq').innerText;
        const d = document.getElementById('dhuhr').innerText;
        const a = document.getElementById('asr').innerText;
        const m = document.getElementById('maghrib').innerText;
        const i = document.getElementById('isha').innerText;
        const text = `📅 مواقيت الصلاة في تعز\n${greg} | ${hij}\n\nالفجر: ${f}   الشروق: ${s}\nالظهر: ${d}   العصر: ${a}\nالمغرب: ${m}   العشاء: ${i}\n\n❄️ تقويم شتاء تعز`;

        if (navigator.share) {
          navigator.share({ title: 'مواقيت تعز', text }).catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      });

      function fallbackCopy(t) {
        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(t).then(() => alert('تم نسخ المواقيت'));
        } else {
          prompt('انسخ النص:', t);
        }
      }

      // تحديث أولي ثم كل دقيقة
      updateDates();
      updatePrayerTimes();
      setInterval(() => { updateDates(); updatePrayerTimes(); }, 60000);

      // ---------- 5. PWA: زر التثبيت و service worker ----------
      let deferredPrompt;
      const installBtn = document.getElementById('installBtn');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'inline-flex';
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          installBtn.style.display = 'none';
        }
        deferredPrompt = null;
      });

      window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
      });

      // محاولة تسجيل service worker (يجب أن يكون ملف sw.js في نفس المسار)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('فشل تسجيل service worker:', err);
          // يمكن للمستخدم إنشاء ملف sw.js بسيط لو أراد دعم عدم الاتصال
        });
      }
    })();
  </script>
  <!-- توجيه للمستخدم: قم بإنشاء ملف sw.js في نفس المجلد بالمحتوى المناسب للتشغيل دون إنترنت -->
</body>
</html>
